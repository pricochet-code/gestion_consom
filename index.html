<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSuivi - Ma Conso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold mb-4 text-center">Suivi Énergie</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Type d'énergie</label>
                <select id="type" class="w-full border p-2 rounded">
                    <option value="Electricité">Électricité (kWh)</option>
                    <option value="Eau">Eau (m³)</option>
                    <option value="Gaz">Gaz (m³)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium">Index du compteur</label>
                <input type="number" id="index" class="w-full border p-2 rounded" placeholder="Ex: 12450">
            </div>
            <button onclick="enregistrerDonnee()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
                Enregistrer le relevé
            </button>
        </div>

        <hr class="my-6">

        <div id="resultats" class="space-y-4">
            <h2 class="font-semibold text-lg text-gray-700">Dernières consommations :</h2>
            <div id="listeConso"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
