<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSuivi Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm">
            <h1 class="text-xl font-bold mb-4">Nouveau Relevé</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="date" id="date" class="border p-2 rounded">
                <select id="type" class="border p-2 rounded">
                    <option value="Electricité">Électricité (kWh)</option>
                    <option value="Eau">Eau (m³)</option>
                    <option value="Gaz">Gaz (kWh)</option>
                </select>
                <input type="number" id="index" class="border p-2 rounded" placeholder="Valeur compteur">
                <button onclick="ajouterReleve()" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Ajouter</button>
            </div>
            <div class="flex gap-4 mt-4">
                <button onclick="toggleHistorique()" class="text-blue-600 text-sm font-medium underline">Afficher l'historique / Modifier</button>
                <button onclick="resetData()" class="text-red-600 text-sm font-medium underline">Remettre à zéro (Tout effacer)</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm">
            <h2 class="text-lg font-semibold mb-4">Analyse de consommation</h2>
            <div class="h-80">
                <canvas id="consoChart"></canvas>
            </div>
        </div>

        <div id="sectionHistorique" class="hidden bg-white p-6 rounded-xl shadow-sm overflow-x-auto">
            <h2 class="text-lg font-semibold mb-4 text-red-600">Historique des saisies</h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b">
                        <th class="p-2">Date</th>
                        <th class="p-2">Type</th>
                        <th class="p-2">Index</th>
                        <th class="p-2">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableHistorique"></tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
